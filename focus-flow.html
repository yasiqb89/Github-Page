<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ryzlo — Live Flow demo</title>
<!--
  Precompiled build of the Live Flow demo (embedded on the main page as an
  iframe). The original design-tool export shipped its JSX source plus a
  loader that pulled Babel + React from unpkg and compiled the scene in the
  visitor's browser on every load (~500KB embedded assets — 94% of it Satoshi
  in three formats — plus ~1MB of CDN fetches and a main-thread compile).
  This build compiles the identical JSX once with esbuild (js/flow-bundle.js),
  self-hosts pinned React 18.3.1 UMD (js/vendor/), and keeps only the woff2
  fonts in the weights the scene actually uses. Rendering is pixel-identical.
  Source JSX lives in the original export (git history of this file).
-->
<style>
/* Satoshi — same faces the original embedded, woff2 only, used weights only
   (300/400/500/700; 600 was never shipped and falls back exactly as before). */
@font-face { font-family: 'Satoshi'; src: url("fonts/satoshi-300.woff2") format('woff2'); font-weight: 300; font-display: swap; font-style: normal; }
@font-face { font-family: 'Satoshi'; src: url("fonts/satoshi-400.woff2") format('woff2'); font-weight: 400; font-display: swap; font-style: normal; }
@font-face { font-family: 'Satoshi'; src: url("fonts/satoshi-500.woff2") format('woff2'); font-weight: 500; font-display: swap; font-style: normal; }
@font-face { font-family: 'Satoshi'; src: url("fonts/satoshi-700.woff2") format('woff2'); font-weight: 700; font-display: swap; font-style: normal; }

html, body { margin: 0; height: 100%; background: #06070A; overflow: hidden; }
/* hide the timeline playback bar for a clean web embed */
[data-omelette-chrome] { display: none !important; }
/* remove floating canvas shadow so the stage fills edge to edge */
svg[data-om-exportable-video-with-duration-secs] { box-shadow: none !important; }
</style>
</head>
<body>
<div id="flow-root" style="position:absolute;inset:0"></div>
<script src="js/vendor/react.production.min.js"></script>
<script src="js/vendor/react-dom.production.min.js"></script>
<script src="js/flow-bundle.js"></script>
<script>
  ReactDOM.createRoot(document.getElementById('flow-root'))
    .render(React.createElement(window.FocusFlowVideo));
</script>
</body>
</html>
