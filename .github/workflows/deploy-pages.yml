name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege needed to deploy Pages via OIDC
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight release
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repo root as-is (static files; .nojekyll disables any
          # Jekyll processing). The marketing site lives under /focus/.
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
